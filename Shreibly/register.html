<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Create your account · Schreibly</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="resources/img/icon.png" />
<link rel="stylesheet" href="resources/css/styles.css" />
</head>
<body>
<button class="kc-lang" type="button">EN ▾</button>
<main class="kc-page">
  <div>
    <section class="kc-card">
      <div class="kc-logo">
        <img src="resources/img/icon.png" alt="" />
        <span class="kc-wordmark">Schreibly</span>
      </div>
      <h1 class="kc-title">Create your account</h1>
      <p class="kc-subtitle">Start writing with Schreibly — free for 14 days.</p>

      <form class="kc-form" action="#" method="post" novalidate>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="kc-field">
            <label class="kc-label" for="firstName">First name</label>
            <input class="kc-input" id="firstName" name="firstName" type="text" autocomplete="given-name" placeholder="Lena" />
          </div>
          <div class="kc-field">
            <label class="kc-label" for="lastName">Last name</label>
            <input class="kc-input" id="lastName" name="lastName" type="text" autocomplete="family-name" placeholder="Weber" />
          </div>
        </div>

        <div class="kc-field">
          <label class="kc-label" for="email">Work email</label>
          <input class="kc-input" id="email" name="email" type="email" autocomplete="email" placeholder="lena@company.com" />
        </div>

        <div class="kc-field">
          <label class="kc-label" for="password">Password</label>
          <div class="kc-pw">
            <input class="kc-input" id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 10 characters" />
            <button class="kc-pw-toggle" type="button" aria-label="Show password" onclick="(()=>{const i=document.getElementById('password');i.type=i.type==='password'?'text':'password'})()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <label class="kc-check" style="font-size:13px; color:#44507A; line-height:1.45; align-items:flex-start;">
          <input type="checkbox" name="termsAccepted" style="margin-top:3px;" />
          <span>I agree to Schreibly's <a class="kc-link" href="#">Terms of Service</a> and <a class="kc-link" href="#">Privacy Policy</a>.</span>
        </label>

        <button class="kc-btn kc-btn--primary" type="submit">Create account</button>
      </form>

      <div class="kc-divider">or sign up with</div>

      <div class="kc-social">
        <button class="kc-btn kc-btn--ghost" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.9-2.26c-.81.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.16.29-1.7V4.97H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l2.99-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
      </div>

      <p class="kc-foot">
        Already have an account? <a class="kc-link" href="login.html">Sign in</a>
      </p>
    </section>
  </div>
</main>
</body>
</html>
