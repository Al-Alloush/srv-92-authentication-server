<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reset your password · Schreibly</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="resources/img/icon.png" />
<link rel="stylesheet" href="resources/css/styles.css" />
</head>
<body>
<button class="kc-lang" type="button">EN ▾</button>
<main class="kc-page">
  <div>
    <section class="kc-card">
      <div class="kc-logo">
        <img src="resources/img/icon.png" alt="" />
        <span class="kc-wordmark">Schreibly</span>
      </div>

      <h1 class="kc-title">Reset your password</h1>
      <p class="kc-subtitle">We&apos;ll email you a secure link to set a new one.</p>

      <div class="kc-alert kc-alert--info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:0 0 auto; margin-top:1px;"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <span>If an account exists for the address you enter, a reset link will arrive within a minute.</span>
      </div>

      <form class="kc-form" action="#" method="post" novalidate>
        <div class="kc-field">
          <label class="kc-label" for="email">Email address</label>
          <input class="kc-input" id="email" name="email" type="email" autocomplete="email" autofocus placeholder="you@company.com" />
        </div>
        <button class="kc-btn kc-btn--primary" type="submit">Send reset link</button>
      </form>

      <p class="kc-foot">
        Remembered it? <a class="kc-link" href="login.html">Back to sign in</a>
      </p>
    </section>
  </div>
</main>
</body>
</html>
