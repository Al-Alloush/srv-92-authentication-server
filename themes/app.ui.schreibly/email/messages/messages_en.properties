# =====================================================================
# Schreibly - Email Messages (English)
# =====================================================================

# --- Email Verification ---
emailVerificationSubject=Verify your email address
emailVerificationBody=Someone has created a {2} account with this email address. If this was you, click the link below to verify your email address:\n\n{0}\n\nThis link will expire within {3}.\n\nIf you didn''t create this account, just ignore this message.
emailVerificationBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Someone has created a <strong>{2}</strong> account with this email address. If this was you, please click the button below to verify your email address.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Verify Email Address</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">This link will expire within <strong>{3}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you didn''t create this account, you can safely ignore this message.</p>

# --- Email Verification with Code ---
emailVerificationBodyCode=Please verify your email address by entering the following code:\n\n{0}
emailVerificationBodyCodeHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Please verify your email address by entering the following code:</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <div style="display:inline-block;background-color:#f0f4f8;border:2px dashed #0099d3;border-radius:8px;padding:16px 40px;">\
        <span style="font-size:32px;font-weight:700;letter-spacing:8px;color:#0099d3;">{0}</span>\
      </div>\
    </td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you did not request this, please ignore this message.</p>

# --- Password Reset ---
passwordResetSubject=Reset your password
passwordResetBody=Someone requested a password reset for your {2} account. If this was you, click the link below to reset your password:\n\n{0}\n\nThis link will expire within {3}.\n\nIf you didn''t request this, just ignore this message.
passwordResetBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">We received a request to reset the password for your <strong>{2}</strong> account. Click the button below to set a new password.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Reset Password</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">This link will expire within <strong>{3}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you didn''t request a password reset, you can safely ignore this message. Your password will not change.</p>

# --- Execute Actions (Admin-initiated) ---
executeActionsSubject=Action required: Update your account
executeActionsBody=Your administrator has requested that you update your {2} account by performing the following action(s): {3}.\n\nClick the link below to start:\n\n{0}\n\nThis link will expire within {4}.\n\nIf you are unaware of this request, just ignore this message.
executeActionsBodyHtml=\
  <p style="margin:0 0 12px;font-size:16px;line-height:1.7;color:#374151;">Your administrator has requested that you update your <strong>{2}</strong> account by completing the following action(s):</p>\
  <p style="margin:0 0 20px;font-size:16px;font-weight:600;color:#0099d3;">{3}</p>\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Click the button below to get started.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Update Account</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">This link will expire within <strong>{4}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you were not expecting this request, please ignore this message.</p>

# --- Email Update Confirmation ---
emailUpdateConfirmationSubject=Confirm your new email address
emailUpdateConfirmationBody=To update your {2} account with email address {1}, click the link below:\n\n{0}\n\nThis link will expire within {3}.\n\nIf you didn''t request this change, just ignore this message.
emailUpdateConfirmationBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">You have requested to update your <strong>{2}</strong> account with the new email address: <strong>{1}</strong>. Click the button below to confirm this change.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Confirm New Email</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">This link will expire within <strong>{3}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you didn''t request this change, you can safely ignore this message.</p>

# --- Identity Provider Link ---
identityProviderLinkSubject=Link your {0} account
identityProviderLinkBody=Someone wants to link your "{1}" account with "{0}" account of user {2}. If this was you, click the link below:\n\n{3}\n\nThis link will expire within {5}.\n\nIf you don''t want to link accounts, just ignore this message.
identityProviderLinkBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Someone has requested to link your <strong>{1}</strong> account with a <strong>{0}</strong> account for user <strong>{2}</strong>. Click the button below to confirm.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{3}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Link Accounts</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">This link will expire within <strong>{5}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you didn''t initiate this request, just ignore this message.</p>

# --- Email Test ---
emailTestSubject=[Schreibly] SMTP test message
emailTestBody=This is a test message from Schreibly.
emailTestBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">This is a test message from <strong>Schreibly</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Your email configuration is working correctly.</p>

# --- Event: Login Error ---
eventLoginErrorSubject=Failed login attempt on your account
eventLoginErrorBody=A failed login attempt was detected on your account on {0} from {1}. If this was not you, please contact an administrator immediately.
eventLoginErrorBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">A failed login attempt was detected on your account.</p>\
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 20px;background-color:#fff8f0;border-left:4px solid #f59e0b;padding:14px 20px;border-radius:0 6px 6px 0;width:100%;">\
    <tr><td><p style="margin:0 0 6px;font-size:13px;color:#92400e;font-weight:600;">Details</p><p style="margin:0;font-size:14px;color:#78350f;">Time: {0} &nbsp;|&nbsp; IP: {1}</p></td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If this was not you, please contact your administrator immediately.</p>

# --- Event: Password Updated ---
eventUpdatePasswordSubject=Your password has been changed
eventUpdatePasswordBody=Your password was changed on {0} from {1}. If this was not you, please contact an administrator.
eventUpdatePasswordBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Your account password has been successfully changed.</p>\
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 20px;background-color:#f0fdf4;border-left:4px solid #22c55e;padding:14px 20px;border-radius:0 6px 6px 0;width:100%;">\
    <tr><td><p style="margin:0 0 6px;font-size:13px;color:#15803d;font-weight:600;">Details</p><p style="margin:0;font-size:14px;color:#166534;">Time: {0} &nbsp;|&nbsp; IP: {1}</p></td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">If you did not make this change, please contact your administrator immediately.</p>

# --- Event: OTP Updated ---
eventUpdateTotpSubject=Two-factor authentication updated
eventUpdateTotpBody=OTP was updated for your account on {0} from {1}. If this was not you, please contact an administrator.
eventUpdateTotpBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Two-factor authentication (OTP) has been updated on your account.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Time: {0} &nbsp;|&nbsp; IP: {1}<br>If this was not you, please contact your administrator immediately.</p>

# --- Event: OTP Removed ---
eventRemoveTotpSubject=Two-factor authentication removed
eventRemoveTotpBody=OTP was removed from your account on {0} from {1}. If this was not you, please contact an administrator.
eventRemoveTotpBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Two-factor authentication (OTP) has been removed from your account.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Time: {0} &nbsp;|&nbsp; IP: {1}<br>If this was not you, please contact your administrator immediately.</p>

# --- Event: Credential Updated ---
eventUpdateCredentialSubject=Credential updated
eventUpdateCredentialBody=Your {0} credential was changed on {1} from {2}. If this was not you, please contact an administrator.
eventUpdateCredentialBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Your <strong>{0}</strong> credential has been updated.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Time: {1} &nbsp;|&nbsp; IP: {2}<br>If this was not you, please contact your administrator immediately.</p>

# --- Event: Credential Removed ---
eventRemoveCredentialSubject=Credential removed
eventRemoveCredentialBody=Credential {0} was removed from your account on {1} from {2}. If this was not you, please contact an administrator.
eventRemoveCredentialBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">The credential <strong>{0}</strong> has been removed from your account.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Time: {1} &nbsp;|&nbsp; IP: {2}<br>If this was not you, please contact your administrator immediately.</p>

# --- Event: Account Disabled (Temporary) ---
eventUserDisabledByTemporaryLockoutSubject=Your account has been temporarily locked
eventUserDisabledByTemporaryLockoutBody=Your account has been temporarily disabled due to multiple failed login attempts on {0}. Please contact an administrator if needed.
eventUserDisabledByTemporaryLockoutHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Your account has been <strong>temporarily locked</strong> due to multiple failed login attempts on <strong>{0}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Please wait or contact your administrator to restore access.</p>

# --- Event: Account Disabled (Permanent) ---
eventUserDisabledByPermanentLockoutSubject=Your account has been permanently locked
eventUserDisabledByPermanentLockoutBody=Your account has been permanently disabled due to multiple failed login attempts on {0}. Please contact an administrator.
eventUserDisabledByPermanentLockoutHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Your account has been <strong>permanently locked</strong> due to multiple failed login attempts on <strong>{0}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Please contact your administrator to restore access.</p>

