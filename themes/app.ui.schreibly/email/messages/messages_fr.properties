eventUserDisabledByTemporaryLockoutBody=Votre compte a été temporairement désactivé en raison de plusieurs tentatives de connexion échouées le {0}. Contactez un administrateur si nécessaire.
eventUserDisabledByTemporaryLockoutHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Votre compte a été <strong>temporairement verrouillé</strong> en raison de plusieurs tentatives de connexion échouées le <strong>{0}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Veuillez patienter ou contacter votre administrateur pour rétablir l''accès.</p>

