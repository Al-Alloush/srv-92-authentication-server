# =====================================================================
# Schreibly - Messages e-mail (Français)
# =====================================================================

# --- Vérification de l'e-mail ---
emailVerificationSubject=Vérifiez votre adresse e-mail
emailVerificationBody=Quelqu''un a créé un compte {2} avec cette adresse e-mail. Si c''est vous, cliquez sur le lien ci-dessous pour vérifier votre adresse e-mail :\n\n{0}\n\nCe lien expirera dans {3}.\n\nSi vous n''êtes pas à l''origine de cette inscription, ignorez ce message.
emailVerificationBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Quelqu''un a créé un compte <strong>{2}</strong> avec cette adresse e-mail. Si c''est vous, cliquez sur le bouton ci-dessous pour vérifier votre adresse e-mail.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Vérifier l''adresse e-mail</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Ce lien expirera dans <strong>{3}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''êtes pas à l''origine de cette inscription, vous pouvez ignorer ce message en toute sécurité.</p>

# --- Vérification de l'e-mail avec code ---
emailVerificationBodyCode=Veuillez vérifier votre adresse e-mail en saisissant le code suivant :\n\n{0}
emailVerificationBodyCodeHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Veuillez vérifier votre adresse e-mail en saisissant le code suivant :</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <div style="display:inline-block;background-color:#f0f4f8;border:2px dashed #0099d3;border-radius:8px;padding:16px 40px;">\
        <span style="font-size:32px;font-weight:700;letter-spacing:8px;color:#0099d3;">{0}</span>\
      </div>\
    </td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''êtes pas à l''origine de cette demande, ignorez ce message.</p>

# --- Réinitialisation du mot de passe ---
passwordResetSubject=Réinitialisation de votre mot de passe
passwordResetBody=Quelqu''un a demandé une réinitialisation du mot de passe pour votre compte {2}. Si c''est vous, cliquez sur le lien ci-dessous pour réinitialiser votre mot de passe :\n\n{0}\n\nCe lien expirera dans {3}.\n\nSi vous n''êtes pas à l''origine de cette demande, ignorez ce message.
passwordResetBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Nous avons reçu une demande de réinitialisation du mot de passe pour votre compte <strong>{2}</strong>. Cliquez sur le bouton ci-dessous pour définir un nouveau mot de passe.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Réinitialiser le mot de passe</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Ce lien expirera dans <strong>{3}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''avez pas demandé de réinitialisation, vous pouvez ignorer ce message. Votre mot de passe ne sera pas modifié.</p>

# --- Actions à effectuer (initiées par l'administrateur) ---
executeActionsSubject=Action requise : mettez à jour votre compte
executeActionsBody=Votre administrateur a demandé que vous mettiez à jour votre compte {2} en effectuant la ou les actions suivantes : {3}.\n\nCliquez sur le lien ci-dessous pour commencer :\n\n{0}\n\nCe lien expirera dans {4}.\n\nSi vous n''êtes pas au courant de cette demande, ignorez ce message.
executeActionsBodyHtml=\
  <p style="margin:0 0 12px;font-size:16px;line-height:1.7;color:#374151;">Votre administrateur a demandé que vous mettiez à jour votre compte <strong>{2}</strong> en effectuant la ou les actions suivantes :</p>\
  <p style="margin:0 0 20px;font-size:16px;font-weight:600;color:#0099d3;">{3}</p>\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Cliquez sur le bouton ci-dessous pour commencer.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Mettre à jour le compte</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Ce lien expirera dans <strong>{4}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''attendiez pas cette demande, ignorez ce message.</p>

# --- Confirmation de mise à jour de l'e-mail ---
emailUpdateConfirmationSubject=Confirmez votre nouvelle adresse e-mail
emailUpdateConfirmationBody=Pour mettre à jour votre compte {2} avec l''adresse e-mail {1}, cliquez sur le lien ci-dessous :\n\n{0}\n\nCe lien expirera dans {3}.\n\nSi vous n''êtes pas à l''origine de cette demande, ignorez ce message.
emailUpdateConfirmationBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Vous avez demandé à mettre à jour votre compte <strong>{2}</strong> avec la nouvelle adresse e-mail : <strong>{1}</strong>. Cliquez sur le bouton ci-dessous pour confirmer ce changement.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Confirmer le nouvel e-mail</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Ce lien expirera dans <strong>{3}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''êtes pas à l''origine de cette demande, vous pouvez ignorer ce message en toute sécurité.</p>

# --- Lien fournisseur d'identité ---
identityProviderLinkSubject=Liez votre compte {0}
identityProviderLinkBody=Quelqu''un souhaite lier votre compte "{1}" avec le compte "{0}" de l''utilisateur {2}. Si c''est vous, cliquez sur le lien ci-dessous :\n\n{3}\n\nCe lien expirera dans {5}.\n\nSi vous ne souhaitez pas lier les comptes, ignorez ce message.
identityProviderLinkBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Quelqu''un a demandé à lier votre compte <strong>{1}</strong> à un compte <strong>{0}</strong> pour l''utilisateur <strong>{2}</strong>. Cliquez sur le bouton ci-dessous pour confirmer.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{3}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Lier les comptes</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Ce lien expirera dans <strong>{5}</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''êtes pas à l''origine de cette demande, ignorez ce message.</p>

# --- Test e-mail ---
emailTestSubject=[Schreibly] Message de test SMTP
emailTestBody=Ceci est un message de test envoyé par Schreibly.
emailTestBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Ceci est un message de test envoyé par <strong>Schreibly</strong>.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Votre configuration e-mail fonctionne correctement.</p>

# --- Événement : échec de connexion ---
eventLoginErrorSubject=Tentative de connexion échouée sur votre compte
eventLoginErrorBody=Une tentative de connexion échouée a été détectée sur votre compte le {0} depuis {1}. Si ce n''était pas vous, contactez immédiatement un administrateur.
eventLoginErrorBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Une tentative de connexion échouée a été détectée sur votre compte.</p>\
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 20px;background-color:#fff8f0;border-left:4px solid #f59e0b;padding:14px 20px;border-radius:0 6px 6px 0;width:100%;">\
    <tr><td><p style="margin:0 0 6px;font-size:13px;color:#92400e;font-weight:600;">Détails</p><p style="margin:0;font-size:14px;color:#78350f;">Heure : {0} &nbsp;|&nbsp; IP : {1}</p></td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si ce n''était pas vous, contactez immédiatement votre administrateur.</p>

# --- Événement : mot de passe mis à jour ---
eventUpdatePasswordSubject=Votre mot de passe a été modifié
eventUpdatePasswordBody=Votre mot de passe a été modifié le {0} depuis {1}. Si ce n''était pas vous, contactez un administrateur.
eventUpdatePasswordBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Le mot de passe de votre compte a été modifié avec succès.</p>\
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 20px;background-color:#f0fdf4;border-left:4px solid #22c55e;padding:14px 20px;border-radius:0 6px 6px 0;width:100%;">\
    <tr><td><p style="margin:0 0 6px;font-size:13px;color:#15803d;font-weight:600;">Détails</p><p style="margin:0;font-size:14px;color:#166534;">Heure : {0} &nbsp;|&nbsp; IP : {1}</p></td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Si vous n''êtes pas à l''origine de ce changement, contactez immédiatement votre administrateur.</p>

