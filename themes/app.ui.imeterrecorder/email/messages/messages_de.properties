# --- E-Mail-Verifizierung ---
emailVerificationSubject=E-Mail-Adresse bestätigen
emailVerificationBody=Jemand hat ein {2}-Konto mit dieser E-Mail-Adresse erstellt. Falls Sie das waren, klicken Sie auf den folgenden Link, um Ihre E-Mail-Adresse zu bestätigen:\n\n{0}\n\nDieser Link läuft in {3} ab.\n\nFalls Sie kein Konto erstellt haben, ignorieren Sie diese Nachricht.
emailVerificationBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Jemand hat ein <strong>{2}</strong>-Konto mit dieser E-Mail-Adresse erstellt. Falls Sie das waren, klicken Sie bitte auf die Schaltfläche unten, um Ihre E-Mail-Adresse zu bestätigen.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">E-Mail-Adresse bestätigen</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Dieser Link läuft in <strong>{3}</strong> ab.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Falls Sie kein Konto erstellt haben, können Sie diese Nachricht ignorieren.</p>

# --- E-Mail-Verifizierung mit Code ---
emailVerificationBodyCode=Bitte bestätigen Sie Ihre E-Mail-Adresse durch Eingabe des folgenden Codes:\n\n{0}
emailVerificationBodyCodeHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Bitte bestätigen Sie Ihre E-Mail-Adresse durch Eingabe des folgenden Codes:</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <div style="display:inline-block;background-color:#f0f4f8;border:2px dashed #0099d3;border-radius:8px;padding:16px 40px;">\
        <span style="font-size:32px;font-weight:700;letter-spacing:8px;color:#0099d3;">{0}</span>\
      </div>\
    </td></tr>\
  </table>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Falls Sie dies nicht angefordert haben, ignorieren Sie bitte diese Nachricht.</p>

# --- Passwort zurücksetzen ---
passwordResetSubject=Passwort zurücksetzen
passwordResetBody=Jemand hat das Zurücksetzen des Passworts für Ihr {2}-Konto angefordert. Falls Sie das waren, klicken Sie auf den folgenden Link:\n\n{0}\n\nDieser Link läuft in {3} ab.\n\nFalls Sie dies nicht angefordert haben, ignorieren Sie diese Nachricht.
passwordResetBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Wir haben eine Anfrage erhalten, das Passwort für Ihr <strong>{2}</strong>-Konto zurückzusetzen. Klicken Sie auf die Schaltfläche unten, um ein neues Passwort festzulegen.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Passwort zurücksetzen</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Dieser Link läuft in <strong>{3}</strong> ab.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Falls Sie kein Zurücksetzen angefordert haben, können Sie diese Nachricht ignorieren. Ihr Passwort bleibt unverändert.</p>

# --- Aktionen erforderlich ---
executeActionsSubject=Aktion erforderlich: Konto aktualisieren
executeActionsBody=Ihr Administrator hat angefordert, dass Sie Ihr {2}-Konto durch folgende Aktion(en) aktualisieren: {3}.\n\nKlicken Sie auf den Link unten:\n\n{0}\n\nDieser Link läuft in {4} ab.
executeActionsBodyHtml=\
  <p style="margin:0 0 12px;font-size:16px;line-height:1.7;color:#374151;">Ihr Administrator hat angefordert, dass Sie Ihr <strong>{2}</strong>-Konto durch folgende Aktion(en) aktualisieren:</p>\
  <p style="margin:0 0 20px;font-size:16px;font-weight:600;color:#0099d3;">{3}</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Konto aktualisieren</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Dieser Link läuft in <strong>{4}</strong> ab.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Falls Sie diese Anfrage nicht erwartet haben, ignorieren Sie bitte diese Nachricht.</p>

# --- E-Mail-Adresse aktualisieren ---
emailUpdateConfirmationSubject=Neue E-Mail-Adresse bestätigen
emailUpdateConfirmationBody=Um Ihr {2}-Konto mit der E-Mail-Adresse {1} zu aktualisieren, klicken Sie auf den Link:\n\n{0}\n\nDieser Link läuft in {3} ab.
emailUpdateConfirmationBodyHtml=\
  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Sie haben die Aktualisierung Ihres <strong>{2}</strong>-Kontos mit der neuen E-Mail-Adresse <strong>{1}</strong> angefordert. Klicken Sie unten zur Bestätigung.</p>\
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:28px 0;">\
    <tr><td align="center">\
      <a href="{0}" style="display:inline-block;background-color:#0099d3;color:#ffffff;padding:14px 36px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:600;letter-spacing:0.3px;">Neue E-Mail bestätigen</a>\
    </td></tr>\
  </table>\
  <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">Dieser Link läuft in <strong>{3}</strong> ab.</p>\
  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Falls Sie diese Änderung nicht angefordert haben, können Sie diese Nachricht ignorieren.</p>

# --- Identitätsanbieter-Link ---
identityProviderLinkSubject={0}-Konto verknüpfen
identityProviderLinkBody=Jemand möchte Ihr "{1}"-Konto mit dem "{0}"-Konto von Benutzer {2} verknüpfen. Falls Sie das waren, klicken Sie auf den Link:\n\n{3}\n\nDieser Link läuft in {5} ab.
