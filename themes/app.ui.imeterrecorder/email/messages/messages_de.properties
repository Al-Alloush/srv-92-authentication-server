  <p style="margin:0;font-size:14px;line-height:1.6;color:#6b7280;">Falls Sie diese Anfrage nicht gestellt haben, ignorieren Sie diese Nachricht.</p>

# --- Test-E-Mail ---
emailTestSubject=[iMeterRecorder] SMTP-Test
emailTestBody=Dies ist eine Test-Nachricht von iMeterRecorder.
emailTestBodyHtml=\
  <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#374151;">Dies ist eine Test-Nachricht von <strong>iMeterRecorder</strong>.</p>\
