  <p style="margin:0 0 20px;font-size:16px;line-height:1.7;color:#374151;">Bu e-posta adresiyle bir <strong>{2}</strong> hesabı oluşturuldu. Eğer bu siz iseniz, lütfen e-posta adresinizi doğrulamak için aşağıdaki düğmeye tıklayın.</p>\
