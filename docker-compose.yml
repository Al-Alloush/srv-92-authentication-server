version: "3.8"

services:
  keycloak:
    #build: .
    #image: auth-server-kc-image:latest
    image: quay.io/keycloak/keycloak:26.5.3
    container_name: keycloak
    command: ["start"]
    ports:
      - "8090:8080"
    environment:
      - KC_HTTP_ENABLED=true                 # ✅ Enable HTTP internally
      - KC_HOSTNAME=https://auth.codexo.dev  # ✅ Public hostname
      - KC_HOSTNAME_STRICT=false             # Allow proxying
      - KC_PROXY=edge                        # Behind TLS-terminating proxy
      - KC_PROXY_HEADERS=xforwarded
      - KC_BOOTSTRAP_ADMIN_USERNAME=authadmin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=T7Y6R%xd2Yh!f3U9a2H/N3IZ§ezK
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgresql_db
      - KC_DB_URL_DATABASE=keycloak_db
      - KC_DB_USERNAME=db_service_admin_username
      - KC_DB_PASSWORD=og§d23S2/(s32h3&ff8(8]HJdx34!a
      - KC_DB_SCHEMA=public
      - KC_SPI_THEME_CACHE_THEMES=false
      - KC_SPI_THEME_CACHE_TEMPLATES=false
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./themes:/opt/keycloak/themes
      #- ./keycloak.conf:/opt/keycloak/conf/keycloak.conf

    # Resource limits (docker compose up)
    cpus: 1.5
    mem_limit: 1G
    mem_reservation: 512M
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.25"
          
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | head -n 1 | grep -q '200\\|302'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      # HTTPS Router
      - "traefik.http.routers.keycloak.rule=Host(`auth.codexo.dev`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      # HTTP Router with redirect
      - "traefik.http.routers.keycloak-http.rule=Host(`auth.codexo.dev`)"
      - "traefik.http.routers.keycloak-http.entrypoints=web"
      - "traefik.http.routers.keycloak-http.middlewares=keycloak-redirect"
      # Redirect middleware
      - "traefik.http.middlewares.keycloak-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.keycloak-redirect.redirectscheme.permanent=true"
      # Service
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"

volumes:
  keycloak_data:
    external: true

networks:
  internal:
    external: true
  proxy:
    external: true
